services:
  traefik:
    image: traefik:v3.6
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
  php:
    environment:
      SSL_MODE: "full"
    depends_on:
      - traefik
  schedule:
    command: ["php", "/var/www/html/artisan", "schedule:work"]
    stop_signal: SIGTERM
    healthcheck:
      test: ["CMD", "healthcheck-schedule"]
      start_period: 10s
  postgres:
    image: postgres:18
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
  valkey:
    image: valkey/valkey:9
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "$${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
  horizon:
    command: ["php", "/var/www/html/artisan", "horizon"]
    stop_signal: SIGTERM
    healthcheck:
      test: ["CMD", "healthcheck-horizon"]
      start_period: 10s
  # Argus shipper: drains the Valkey transition buffer into Postgres. Long-running,
  # restarted on exit like a supervised process.
  argus-ship:
    command: ["php", "/var/www/html/artisan", "argus:ship"]
    stop_signal: SIGTERM
    restart: unless-stopped
